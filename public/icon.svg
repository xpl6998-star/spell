<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 主背景红色圆角矩形 -->
  <rect x="32" y="32" width="448" height="448" rx="32" fill="#ff4433" />

  <!-- 文字 "Hot spot" -->
  <text x="100" y="130" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
    <tspan x="100" dy="0">Hot</tspan>
    <tspan x="100" dy="70">spot</tspan>
  </text>

  <!-- 向上箭头 -->
  <path d="M 380 90 L 430 150 L 405 150 L 405 230 L 355 230 L 355 150 L 330 150 Z" fill="white" />

  <!-- 白色文本框背景 -->
  <rect x="85" y="220" width="342" height="230" rx="16" fill="white" />

  <!-- 文本占位虚线 -->
  <line x1="130" y1="290" x2="390" y2="290" stroke="#ff4433" stroke-width="4" stroke-dasharray="4 4" />
  <line x1="130" y1="340" x2="330" y2="340" stroke="#ff4433" stroke-width="4" stroke-dasharray="4 4" />
  <line x1="130" y1="390" x2="390" y2="390" stroke="#ff4433" stroke-width="4" stroke-dasharray="4 4" />
</svg>